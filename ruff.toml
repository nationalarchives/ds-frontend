exclude = [
    "migrations"
]

[lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "B",
    "W",
    "Q",
    "I",
    "C90",
    "FAST",
    "DJ",
    "FIX",
    "A",
    "LOG",
    "T20",
    "RET",
    "SIM",
    "TD",
    "N",
    "PL",
    "UP",
    "RUF",
    "TRY"
]

[lint.per-file-ignores]
